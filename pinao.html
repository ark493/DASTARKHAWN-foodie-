 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS KEYS V2 — Laptop Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05050e;--surface:#0c0c1a;--border:#1c1c38;
  --cyan:#00e5ff;--pink:#e040fb;--amber:#ffd740;--green:#69ff47;--red:#ff4444;
  --w-key-bg:linear-gradient(180deg,#181830 0%,#1e1e3a 60%,#232345 100%);
  --b-key-bg:linear-gradient(180deg,#07070f 0%,#0d0d1e 100%);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:#fff;font-family:'JetBrains Mono',monospace;}

/* ── COMPACT HUB ICON ── */
.hub-link {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10001;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--cyan);
    text-decoration: none;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.hub-link:hover {
    border-color: var(--cyan);
    background: rgba(0, 229, 255, 0.1);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
    transform: scale(1.1);
}

/* ── SCANLINE ── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100vh;}

/* ── TOP BAR ── */
#topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px;background:rgba(5,5,14,0.95);
  border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;
  padding-left: 60px; /* Space for the Hub icon */
}
#logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.2rem;
  letter-spacing:.2em;white-space:nowrap;}
#logo .l1{color:var(--cyan);text-shadow:0 0 16px var(--cyan);}
#logo .l2{color:var(--pink);text-shadow:0 0 16px var(--pink);}

.mode-tabs{display:flex;gap:3px;}
.mtab{font-family:'Orbitron',sans-serif;font-size:.58rem;letter-spacing:.1em;
  padding:5px 12px;border:1px solid #2a2a4a;background:transparent;
  color:#4a4a6a;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.mtab:hover{border-color:var(--cyan);color:var(--cyan);}
.mtab.active{background:var(--cyan);color:#000;border-color:var(--cyan);
  box-shadow:0 0 10px var(--cyan);}

.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
select,button.tbtn{
  background:var(--surface);border:1px solid var(--border);color:#aaa;
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  padding:4px 8px;cursor:pointer;outline:none;transition:all .15s;}
select:hover,button.tbtn:hover{border-color:var(--cyan);color:var(--cyan);}
button.tbtn.on{border-color:var(--green);color:var(--green);box-shadow:0 0 6px var(--green);}
button.tbtn.rec{border-color:var(--red);color:var(--red);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── STATUS BAR ── */
#statusbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:4px 18px;background:var(--surface);border-bottom:1px solid var(--border);
  font-size:.62rem;gap:8px;flex-wrap:wrap;
}
#chord-tag{font-family:'Orbitron',sans-serif;font-size:.85rem;
  color:var(--amber);min-width:130px;letter-spacing:.05em;}
#note-tag{color:var(--cyan);letter-spacing:.08em;}
#score-tag{font-family:'Orbitron',sans-serif;font-size:.78rem;color:var(--pink);}
#metro-dots{display:flex;gap:4px;align-items:center;}
.mdot{width:8px;height:8px;border-radius:50%;background:#222;transition:background .05s;}
.mdot.beat{background:var(--amber);box-shadow:0 0 6px var(--amber);}

/* ── KEYBOARD GUIDE STRIP ── */
#kb-guide-strip{
  flex-shrink:0;background:#060612;border-bottom:1px solid var(--border);
  padding:5px 18px;display:flex;align-items:center;gap:6px;overflow-x:auto;
  scrollbar-width:none;
}
#kb-guide-strip::-webkit-scrollbar{display:none;}
.guide-label{font-size:.5rem;color:#3a3a5a;white-space:nowrap;
  letter-spacing:.08em;text-transform:uppercase;margin-right:4px;}
.guide-row{display:flex;gap:3px;}
.gkey{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:26px;height:26px;border:1px solid #1a1a30;border-radius:3px;
  font-size:.55rem;font-weight:700;flex-shrink:0;cursor:default;
}
.gkey.gwhite{background:#181830;color:var(--cyan);border-color:#2a2a4a;}
.gkey.gblack{background:#0a0a1a;color:var(--pink);border-color:#2a1a3a;}
.gkey .gn{font-size:.42rem;color:#3a3a5a;line-height:1;}
.gkey .gk{font-size:.58rem;font-weight:700;line-height:1.2;}
.guide-sep{width:1px;background:#1a1a30;flex-shrink:0;height:22px;margin:0 3px;}

/* ── MAIN AREA ── */
#main{flex:1;position:relative;overflow:hidden;min-height:0;
  background:radial-gradient(ellipse at 50% 110%,#08081a 0%,#03030a 70%);}
#main canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#bgCvs{z-index:1;}
#fallCvs{z-index:4;}
#pCvs{z-index:6;pointer-events:none;}

/* Visualizer */
#vizCvs{position:absolute;bottom:0;left:0;width:100%;height:60px;z-index:5;pointer-events:none;}

/* HIT LINE */
#hit-line{position:absolute;bottom:0;left:0;width:100%;height:3px;z-index:7;
  background:linear-gradient(90deg,transparent 0%,var(--cyan) 30%,var(--pink) 70%,transparent 100%);
  box-shadow:0 0 14px var(--cyan),0 -2px 20px rgba(0,229,255,.3);}

/* COMBO / FEEDBACK */
#combo-pop{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;
  pointer-events:none;z-index:20;opacity:0;
  letter-spacing:.15em;text-align:center;
  transition:opacity .1s;
}
#combo-pop.show{opacity:1;animation:comboPop .5s ease-out forwards;}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(1.4)}100%{transform:translate(-50%,-50%) scale(.8);opacity:0;}}
#combo-pop.perfect{color:var(--amber);text-shadow:0 0 30px var(--amber);}
#combo-pop.good{color:var(--cyan);text-shadow:0 0 20px var(--cyan);}
#combo-pop.miss{color:var(--red);text-shadow:0 0 20px var(--red);}

/* EAR TRAINING PANEL */
#ear-panel{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(5,5,14,.97);border:1px solid var(--cyan);
  padding:18px 22px;z-index:30;min-width:340px;text-align:center;
  box-shadow:0 0 40px rgba(0,229,255,.15);display:none;
}
.ep-title{font-family:'Orbitron',sans-serif;font-size:.75rem;
  color:var(--cyan);letter-spacing:.15em;margin-bottom:12px;}
.ep-q{font-size:.7rem;color:#ccc;margin-bottom:14px;}
.ep-choices{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.epc{padding:7px 3px;border:1px solid #1a1a30;background:var(--surface);
  color:#aaa;font-family:'JetBrains Mono',monospace;font-size:.65rem;
  cursor:pointer;transition:all .15s;}
.epc:hover{border-color:var(--cyan);color:var(--cyan);}
.epc.correct{border-color:var(--green);color:var(--green);background:rgba(105,255,71,.1);}
.epc.wrong{border-color:var(--red);color:var(--red);background:rgba(255,68,68,.1);}
.ep-fb{font-size:.7rem;min-height:18px;margin:6px 0;}
.ep-score{font-family:'Orbitron',sans-serif;font-size:.68rem;color:var(--amber);margin-bottom:10px;}
.epbtn{padding:7px 18px;border:1px solid var(--pink);background:transparent;
  color:var(--pink);cursor:pointer;font-family:'Orbitron',sans-serif;
  font-size:.58rem;letter-spacing:.1em;transition:all .2s;margin:0 4px;}
.epbtn:hover{background:var(--pink);color:#000;}

/* SONG SELECT PANEL */
#song-panel{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(5,5,14,.97);border:1px solid var(--amber);
  padding:18px 22px;z-index:30;min-width:380px;text-align:center;
  box-shadow:0 0 40px rgba(255,215,64,.12);display:none;max-height:90%;overflow-y:auto;
}
.sp-title{font-family:'Orbitron',sans-serif;font-size:.75rem;
  color:var(--amber);letter-spacing:.15em;margin-bottom:14px;}
.song-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.song-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border:1px solid #1a1a30;background:var(--surface);
  cursor:pointer;transition:all .18s;}
.song-row:hover{border-color:var(--amber);}
.song-row.sel{border-color:var(--amber);background:rgba(255,215,64,.05);}
.sr-name{font-size:.7rem;text-align:left;}
.sr-diff{font-size:.55rem;padding:2px 7px;font-weight:700;}
.diff-beginner{background:rgba(105,255,71,.15);color:var(--green);}
.diff-intermediate{background:rgba(255,215,64,.15);color:var(--amber);}
.diff-advanced{background:rgba(224,64,251,.15);color:var(--pink);}
.diff-pro{background:rgba(0,229,255,.15);color:var(--cyan);}
.sp-btns{display:flex;gap:8px;justify-content:center;}
.spbtn{padding:9px 22px;border:1px solid var(--amber);background:transparent;
  color:var(--amber);cursor:pointer;font-family:'Orbitron',sans-serif;
  font-size:.62rem;letter-spacing:.1em;transition:all .2s;}
.spbtn:hover{background:var(--amber);color:#000;}
.spbtn.cancel{border-color:#3a3a5a;color:#4a4a6a;}
.spbtn.cancel:hover{border-color:#aaa;color:#aaa;background:transparent;}

/* RESULT OVERLAY */
#result-overlay{
  position:absolute;inset:0;background:rgba(5,5,14,.97);z-index:40;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.ro-grade{font-family:'Orbitron',sans-serif;font-size:5rem;font-weight:900;
  text-shadow:0 0 50px currentColor;}
.ro-title{font-family:'Orbitron',sans-serif;font-size:1.2rem;letter-spacing:.15em;}
.ro-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.ro-stat{background:var(--surface);border:1px solid var(--border);
  padding:12px 20px;text-align:center;min-width:90px;}
.ro-val{font-family:'Orbitron',sans-serif;font-size:1.6rem;color:var(--amber);}
.ro-lbl{font-size:.5rem;color:#4a4a6a;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.ro-btns{display:flex;gap:10px;}
.robtn{padding:10px 24px;border:1px solid;background:transparent;
  cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.62rem;
  letter-spacing:.1em;transition:all .2s;}
.robtn.retry{border-color:var(--cyan);color:var(--cyan);}
.robtn.retry:hover{background:var(--cyan);color:#000;}
.robtn.back{border-color:#3a3a5a;color:#5a5a7a;}
.robtn.back:hover{border-color:#aaa;color:#aaa;}

/* COUNTDOWN */
#countdown{position:absolute;inset:0;z-index:35;display:none;
  align-items:center;justify-content:center;background:rgba(0,0,0,.5);}
.cd-n{font-family:'Orbitron',sans-serif;font-size:10rem;font-weight:900;
  color:var(--cyan);text-shadow:0 0 60px var(--cyan);
  animation:cdAnim .85s ease-out forwards;}
@keyframes cdAnim{0%{transform:scale(1.8);opacity:0}40%{opacity:1}100%{transform:scale(.5);opacity:0}}

/* PROGRESS */
#prog-wrap{position:absolute;top:0;left:0;right:0;height:3px;z-index:15;background:#111;display:none;}
#prog-bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--pink));transition:width .1s;}

/* ══════════════════════════════════════════════════
   PIANO KEYS — BIG & CLEAR
══════════════════════════════════════════════════ */
#piano-wrap{
  flex-shrink:0;background:#080814;border-top:2px solid #1a1a30;
  padding:0 14px 10px;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:thin;scrollbar-color:#2a2a4a transparent;
}
#piano-wrap::-webkit-scrollbar{height:4px;}
#piano-wrap::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px;}
#piano{position:relative;height:220px;width:max-content;margin:0 auto;display:flex;padding-top:10px;}

/* WHITE KEYS */
.wkey{
  position:relative;width:54px;height:210px;
  background:var(--w-key-bg);
  border:1px solid #1e1e38;border-top:2px solid #2a2a48;
  border-radius:0 0 8px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding-bottom:6px;margin-right:2px;
  transition:background .05s,box-shadow .05s;user-select:none;
}
.wkey:hover{background:linear-gradient(180deg,#1e1e38 0%,#242446 100%);}
.wkey.pressed{
  background:linear-gradient(180deg,#003344 0%,#004455 100%) !important;
  box-shadow:0 0 22px var(--cyan),inset 0 -6px 14px rgba(0,229,255,.35) !important;
  border-color:var(--cyan) !important;
}
.wkey.scale-hi{border-color:var(--pink);background:linear-gradient(180deg,#180028 0%,#0e0018 100%);}
/* incoming glow */
.wkey.incoming{box-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,229,255,.2) !important;
  border-color:var(--cyan) !important;}

/* KEY LABELS — BIG keyboard shortcut badge */
.key-shortcut{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:4px;
  background:#0a0a1a;border:2px solid #2a2a4a;
  font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;
  color:var(--cyan);letter-spacing:0;line-height:1;
  margin-bottom:4px;flex-shrink:0;
  box-shadow:0 0 0 0 transparent;transition:box-shadow .1s;
}
.wkey.pressed .key-shortcut{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.key-notename{font-size:.52rem;color:#3a3a6a;letter-spacing:.04em;margin-bottom:2px;}

/* BLACK KEYS */
.bkey{
  position:absolute;top:10px;width:36px;height:128px;
  background:var(--b-key-bg);
  border:1px solid #1e1e38;border-bottom:3px solid #242438;
  border-radius:0 0 5px 5px;cursor:pointer;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;padding-bottom:5px;
  transition:background .05s,box-shadow .05s;user-select:none;
}
.bkey:hover{background:linear-gradient(180deg,#111120 0%,#18182a 100%);}
.bkey.pressed{
  background:linear-gradient(180deg,#330044 0%,#1a0022 100%) !important;
  box-shadow:0 0 18px var(--pink),inset 0 -2px 8px rgba(224,64,251,.4) !important;
  border-color:var(--pink) !important;
}
.bkey.incoming{box-shadow:0 0 18px var(--pink),0 0 35px rgba(224,64,251,.2) !important;
  border-color:var(--pink) !important;}

/* Black key shortcut badge */
.bkey .key-shortcut{
  width:28px;height:28px;font-size:.72rem;
  background:#07070e;border-color:#2a1a3a;
  color:var(--pink);
}
.bkey.pressed .key-shortcut{border-color:var(--pink);box-shadow:0 0 6px var(--pink);}
.bkey .key-notename{font-size:.44rem;color:#2a1a3a;}

</style>
</head>
<body>

<!-- COMPACT HUB ICON (No Text) -->
<a href="crazy.html" class="hub-link" title="Back to Hub">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
</a>

<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="logo"><span class="l1">NEXUS</span><span class="l2">KEYS</span> <span style="font-size:.5rem;color:#2a2a4a;letter-spacing:.3em">V2</span></div>
    <div class="mode-tabs">
      <button class="mtab active" data-mode="free">FREE PLAY</button>
      <button class="mtab" data-mode="learn">LEARN</button>
      <button class="mtab" data-mode="ear">EAR TRAIN</button>
    </div>
    <div class="topbar-right">
      <span style="font-size:.52rem;color:#3a3a5a">SOUND</span>
      <select id="sel-sound">
        <option value="piano">Piano</option>
        <option value="synth">Synth Pad</option>
        <option value="organ">Organ</option>
        <option value="chiptune">Chiptune</option>
        <option value="electric">Electric</option>
      </select>
      <span style="font-size:.52rem;color:#3a3a5a">SCALE</span>
      <select id="sel-scale">
        <option value="">None</option>
        <option value="major">Major</option>
        <option value="minor">Minor</option>
        <option value="penta">Pentatonic</option>
        <option value="blues">Blues</option>
        <option value="dorian">Dorian</option>
      </select>
      <span style="font-size:.52rem;color:#3a3a5a">BPM</span>
      <select id="sel-bpm">
        <option value="0">Off</option>
        <option value="60">60</option>
        <option value="80">80</option>
        <option value="100">100</option>
        <option value="120">120</option>
        <option value="140">140</option>
      </select>
      <button class="tbtn on" id="btn-labels">LABELS ON</button>
      <button class="tbtn" id="btn-rec">⏺ REC</button>
      <button class="tbtn" id="btn-play" style="display:none">▶ PLAY</button>
      <button class="tbtn" id="btn-clr" style="display:none">✕ CLR</button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div id="chord-tag">—</div>
    <div id="note-tag">Press a key · or use keyboard below</div>
    <div id="metro-dots">
      <div class="mdot" id="md0"></div><div class="mdot" id="md1"></div>
      <div class="mdot" id="md2"></div><div class="mdot" id="md3"></div>
    </div>
    <div id="score-tag" style="display:none">0</div>
  </div>

  <!-- KEYBOARD GUIDE STRIP -->
  <div id="kb-guide-strip"></div>

  <!-- MAIN (falling notes + visuals) -->
  <div id="main">
    <canvas id="bgCvs"></canvas>
    <canvas id="fallCvs"></canvas>
    <canvas id="pCvs"></canvas>
    <canvas id="vizCvs"></canvas>
    <div id="hit-line"></div>
    <div id="prog-wrap"><div id="prog-bar"></div></div>
    <div id="combo-pop"></div>

    <!-- EAR TRAINING -->
    <div id="ear-panel">
      <div class="ep-title">🎵 EAR TRAINING</div>
      <div class="ep-q" id="ep-q">Listen — identify the note</div>
      <div class="ep-choices" id="ep-choices"></div>
      <div class="ep-fb" id="ep-fb"></div>
      <div class="ep-score" id="ep-score">Score: 0 / 0</div>
      <button class="epbtn" id="ep-play">▶ PLAY NOTE</button>
      <button class="epbtn" id="ep-next" style="display:none">NEXT →</button>
    </div>

    <!-- SONG SELECT -->
    <div id="song-panel">
      <div class="sp-title">⬇ SELECT SONG</div>
      <div class="song-list" id="song-list"></div>
      <div class="sp-btns">
        <button class="spbtn" id="sp-start">START</button>
        <button class="spbtn cancel" id="sp-cancel">CANCEL</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="result-overlay">
      <div class="ro-grade" id="ro-grade">S</div>
      <div class="ro-title" id="ro-title">COMPLETE!</div>
      <div class="ro-stats">
        <div class="ro-stat"><div class="ro-val" id="ro-hits">0</div><div class="ro-lbl">Hits</div></div>
        <div class="ro-stat"><div class="ro-val" id="ro-miss">0</div><div class="ro-lbl">Misses</div></div>
        <div class="ro-stat"><div class="ro-val" id="ro-acc">0%</div><div class="ro-lbl">Accuracy</div></div>
        <div class="ro-stat"><div class="ro-val" id="ro-combo">0</div><div class="ro-lbl">Max Combo</div></div>
      </div>
      <div class="ro-btns">
        <button class="robtn retry" id="ro-retry">↺ RETRY</button>
        <button class="robtn back" id="ro-back">MENU</button>
      </div>
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown"><span class="cd-n" id="cd-n">3</span></div>
  </div>

  <!-- PIANO -->
  <div id="piano-wrap">
    <div id="piano"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   NOTE DATA & KEYBOARD MAPPING
═══════════════════════════════════════════════════════ */
const SEMITONES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_COLORS = {
  'C':'#00e5ff','C#':'#00bfff','D':'#69ff47','D#':'#40e060',
  'E':'#ffd740','F':'#ff9800','F#':'#ff6600','G':'#e040fb',
  'G#':'#9c27b0','A':'#00e5ff','A#':'#18ffff','B':'#ff80ab'
};

const KEY_TABLE = [
  ['C',3,'Z'],['C#',3,'S'],['D',3,'X'],['D#',3,'D'],['E',3,'C'],
  ['F',3,'V'],['F#',3,'G'],['G',3,'B'],['G#',3,'H'],['A',3,'N'],['A#',3,'J'],['B',3,'M'],
  ['C',4,'Q'],['C#',4,'2'],['D',4,'W'],['D#',4,'3'],['E',4,'E'],
  ['F',4,'R'],['F#',4,'5'],['G',4,'T'],['G#',4,'6'],['A',4,'Y'],['A#',4,'7'],['U',4,'U'],
  ['C',5,'I'],['C#',5,'9'],['D',5,'O'],['D#',5,'0'],['E',5,'P'],
];
KEY_TABLE[23] = ['B',4,'U'];

const NOTES = KEY_TABLE.map(([n,oct,k]) => ({
  name: n+oct,
  note: n,
  oct,
  key: k,
  isBlack: n.includes('#'),
  midi: (oct+1)*12 + SEMITONES.indexOf(n),
  color: NOTE_COLORS[n]
}));

const BY_NAME = {};
const BY_KEY  = {};
NOTES.forEach(n => { BY_NAME[n.name]=n; BY_KEY[n.key]=n; });

function midiFreq(m){ return 440*Math.pow(2,(m-69)/12); }

/* ═══════════════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════════════ */
let AC=null, masterGain, analyser;
function getAC(){
  if(!AC){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.85;
    analyser=AC.createAnalyser(); analyser.fftSize=512;
    masterGain.connect(analyser); analyser.connect(AC.destination);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}

let soundMode='piano';
const activeAudioNodes={};

function startNote(note){
  const ac=getAC(); const t=ac.currentTime;
  const f=midiFreq(note.midi);
  const gain=ac.createGain();
  gain.connect(masterGain);
  const oscs=[];

  if(soundMode==='piano'){
    [[1,'triangle',.55],[2,'sine',.18],[3,'sine',.08],[4,'sine',.04]].forEach(([m,tp,a])=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type=tp; o.frequency.value=f*m; g.gain.value=a;
      o.connect(g); g.connect(gain); o.start(t); oscs.push(o);
    });
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(.8,t+.006);
    gain.gain.exponentialRampToValueAtTime(.22,t+.35);
    gain.gain.exponentialRampToValueAtTime(.0001,t+3.2);
  } else if(soundMode==='synth'){
    const o=ac.createOscillator(); const fl=ac.createBiquadFilter();
    o.type='sawtooth'; o.frequency.value=f;
    fl.type='lowpass'; fl.frequency.setValueAtTime(1400,t);
    fl.frequency.exponentialRampToValueAtTime(700,t+2);
    fl.Q.value=5; o.connect(fl); fl.connect(gain);
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(.55,t+.07);
    o.start(t); oscs.push(o);
  } else if(soundMode==='organ'){
    [1,2,3,4,5].forEach((h,i)=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type='sine'; o.frequency.value=f*h; g.gain.value=.3/(i+1);
      o.connect(g); g.connect(gain); o.start(t); oscs.push(o);
    });
    gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(.9,t+.01);
  } else if(soundMode==='chiptune'){
    const o=ac.createOscillator(); o.type='square'; o.frequency.value=f;
    o.connect(gain); gain.gain.setValueAtTime(.28,t);
    gain.gain.exponentialRampToValueAtTime(.0001,t+.6); o.start(t); oscs.push(o);
  } else if(soundMode==='electric'){
    [[1,'sine',.38],[2.01,'sine',.2],[3,'triangle',.1]].forEach(([m,tp,a])=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type=tp; o.frequency.value=f*m; g.gain.value=a;
      o.connect(g); g.connect(gain); o.start(t); oscs.push(o);
    });
    gain.gain.setValueAtTime(0,t);
    gain.gain.linearRampToValueAtTime(.75,t+.003);
    gain.gain.exponentialRampToValueAtTime(.28,t+.25);
    gain.gain.exponentialRampToValueAtTime(.0001,t+2.2);
  }
  activeAudioNodes[note.name]={gain,oscs};
}

function stopNote(noteName){
  const n=activeAudioNodes[noteName]; if(!n) return;
  const t=getAC().currentTime;
  n.gain.gain.cancelScheduledValues(t);
  n.gain.gain.setValueAtTime(n.gain.gain.value,t);
  n.gain.gain.exponentialRampToValueAtTime(.0001,t+.12);
  setTimeout(()=>n.oscs.forEach(o=>{try{o.stop()}catch(e){}}),200);
  delete activeAudioNodes[noteName];
}

/* ═══════════════════════════════════════════════════════
   CHORD DETECTION
═══════════════════════════════════════════════════════ */
const CHORD_TYPES=[
  {n:'maj',i:[0,4,7]},{n:'min',i:[0,3,7]},{n:'dim',i:[0,3,6]},{n:'aug',i:[0,4,8]},
  {n:'maj7',i:[0,4,7,11]},{n:'min7',i:[0,3,7,10]},{n:'dom7',i:[0,4,7,10]},
  {n:'sus2',i:[0,2,7]},{n:'sus4',i:[0,5,7]},{n:'add9',i:[0,4,7,14]}
];
function detectChord(pressed){
  if(!pressed.size) return '—';
  if(pressed.size===1) return [...pressed][0].replace(/\d/,'');
  const midis=[...pressed].map(n=>BY_NAME[n]?.midi||0).sort((a,b)=>a-b);
  const root=midis[0]%12;
  const ivs=midis.map(m=>((m-midis[0])%12+12)%12).filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b);
  for(const ct of CHORD_TYPES){
    if(JSON.stringify(ivs)===JSON.stringify(ct.i)) return SEMITONES[root]+' '+ct.n;
  }
  return ivs.map(i=>SEMITONES[(root+i)%12]).join('+');
}

═══════════════════════════════════════════════════════ */
const SCALE_PATTERNS={
  '':[],'major':[0,2,4,5,7,9,11],'minor':[0,2,3,5,7,8,10],
  'penta':[0,2,4,7,9],'blues':[0,3,5,6,7,10],'dorian':[0,2,3,5,7,9,10]
};
let currentScale='';
function applyScale(){
  const p=SCALE_PATTERNS[currentScale]||[];
  document.querySelectorAll('[data-note-name]').forEach(el=>{
    const n=el.dataset.noteName;
    const semi=SEMITONES.indexOf(n.replace(/\d/,''));
    el.classList.toggle('scale-hi',p.length>0&&p.includes(semi));
  });
}

   PIANO BUILDER
═══════════════════════════════════════════════════════ */
let showLabels=true;
const pianoEl=document.getElementById('piano');

function buildPiano(){
  pianoEl.innerHTML='';
  const whites=NOTES.filter(n=>!n.isBlack);
  const blacks=NOTES.filter(n=>n.isBlack);
  const KW=54 + 2; 

  whites.forEach((note,i)=>{
    const k=document.createElement('div');
    k.className='wkey';
    k.dataset.noteName=note.name;
    k.innerHTML=`
      <span class="key-notename" style="color:${note.color}88">${note.note}</span>
      <div class="key-shortcut" style="color:${note.color};border-color:${note.color}44">${note.key}</div>
    `;
    addTouchMouseListeners(k, note.name);
    pianoEl.appendChild(k);
  });

  requestAnimationFrame(()=>{
    let wi=-1;
    NOTES.forEach(note=>{
      if(!note.isBlack){ wi++; return; }
      const k=document.createElement('div');
      k.className='bkey';
      k.dataset.noteName=note.name;
      const left=wi*KW + KW - 18;
      k.style.left=left+'px';
      k.innerHTML=`
        <span class="key-notename" style="color:${note.color}88;font-size:.4rem">${note.note}</span>
        <div class="key-shortcut" style="color:${note.color};border-color:${note.color}44">${note.key}</div>
      `;
      addTouchMouseListeners(k, note.name);
      pianoEl.appendChild(k);
    });
    updateLabels();
    applyScale();
  });
}

function updateLabels(){
  document.querySelectorAll('.key-notename,.key-shortcut').forEach(el=>{
    if(el.classList.contains('key-shortcut')) return; 
    el.style.display=showLabels?'':'none';
  });
}

function addTouchMouseListeners(el, noteName){
  el.addEventListener('mousedown',e=>{e.preventDefault();pressKey(noteName);});
  el.addEventListener('mouseup',()=>releaseKey(noteName));
  el.addEventListener('mouseleave',()=>releaseKey(noteName));
  el.addEventListener('touchstart',e=>{e.preventDefault();pressKey(noteName);},{passive:false});
  el.addEventListener('touchend',()=>releaseKey(noteName));
}

/* ═══════════════════════════════════════════════════════
   KEY PRESS / RELEASE
═══════════════════════════════════════════════════════ */
const pressed=new Set();

function pressKey(noteName){
  if(pressed.has(noteName)) return;
  const note=BY_NAME[noteName]; if(!note) return;
  pressed.add(noteName);
  startNote(note);
  document.querySelectorAll(`[data-note-name="${noteName}"]`)
    .forEach(el=>el.classList.add('pressed'));
  spawnParticles(noteName);
  document.getElementById('chord-tag').textContent=detectChord(pressed);
  document.getElementById('note-tag').textContent=`▶ ${noteName}`;
  if(recording) recEvents.push({t:performance.now()-recStart,type:'on',n:noteName});
  if(appMode==='learn'&&learnActive) checkLearnHit(noteName);
  if(appMode==='ear'&&earTarget&&!earAnswered) checkEarAnswer(noteName);
}

function releaseKey(noteName){
  if(!pressed.has(noteName)) return;
  pressed.delete(noteName);
  if(['synth','organ'].includes(soundMode)) stopNote(noteName);
  document.querySelectorAll(`[data-note-name="${noteName}"]`)
    .forEach(el=>el.classList.remove('pressed','incoming'));
  document.getElementById('chord-tag').textContent=detectChord(pressed);
}

const held=new Set();
document.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const k=e.key.toUpperCase();
  const note=BY_KEY[k];
  if(note){e.preventDefault();held.add(k);pressKey(note.name);}
});
document.addEventListener('keyup',e=>{
  const k=e.key.toUpperCase();
  const note=BY_KEY[k];
  if(note){held.delete(k);releaseKey(note.name);}
});

/* ═══════════════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════════════ */
const pCvs=document.getElementById('pCvs');
const pCtx=pCvs.getContext('2d');
let parts=[];

function resizePCvs(){
  pCvs.width=pCvs.offsetWidth; pCvs.height=pCvs.offsetHeight;
}

function spawnParticles(noteName){
  const el=document.querySelector(`[data-note-name="${noteName}"]`); if(!el) return;
  const kr=el.getBoundingClientRect();
  const pr=pCvs.getBoundingClientRect();
  const cx=kr.left-pr.left+kr.width/2;
  const cy=kr.top-pr.top;
  const note=BY_NAME[noteName];
  const color=note?.color||'#fff';
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1.5+Math.random()*4;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,
      life:1,color,sz:2+Math.random()*3.5,g:.13});
  }
}

function animParts(){
  pCtx.clearRect(0,0,pCvs.width,pCvs.height);
  parts=parts.filter(p=>p.life>.02);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life*=.93;
    pCtx.save();
    pCtx.globalAlpha=p.life;
    pCtx.fillStyle=p.color;
    pCtx.shadowColor=p.color; pCtx.shadowBlur=5;
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
    pCtx.fill();
    pCtx.restore();
  });
  requestAnimationFrame(animParts);
}

   BACKGROUND + VISUALIZER

const bgCvs=document.getElementById('bgCvs');
const bgCtx=bgCvs.getContext('2d');
const vizCvs=document.getElementById('vizCvs');
const vizCtx=vizCvs.getContext('2d');

function resizeCvs(){
  [bgCvs,document.getElementById('fallCvs'),pCvs,vizCvs].forEach(c=>{
    if(c){
        c.width=c.offsetWidth; 
        c.height=c.offsetHeight || 60;
    }
  });
}
window.addEventListener('resize',()=>{resizeCvs();buildPiano();buildGuideStrip();});

const STARS=Array.from({length:120},()=>({
  x:Math.random(),y:Math.random(),r:.3+Math.random()*1.2,
  ph:Math.random()*Math.PI*2,sp:.2+Math.random()*.8
}));

function drawBG(t){
  const W=bgCvs.width,H=bgCvs.height;
  bgCtx.clearRect(0,0,W,H);
  STARS.forEach(s=>{
    const a=.15+.35*Math.abs(Math.sin(t*.0004*s.sp+s.ph));
    bgCtx.beginPath(); bgCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`; bgCtx.fill();
  });
}

function drawViz(){
  if(!analyser) return;
  const W=vizCvs.width,H=vizCvs.height;
  vizCtx.clearRect(0,0,W,H);
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const bw=W/data.length*2.2;
  for(let i=0;i<data.length;i++){
    const v=data[i]/255;
    if(v<.01) continue;
    const hue=180+i*2;
    vizCtx.fillStyle=`hsla(${hue},100%,60%,${(v*.6).toFixed(2)})`;
    vizCtx.shadowColor=`hsla(${hue},100%,60%,1)`; vizCtx.shadowBlur=4;
    vizCtx.fillRect(i*(bw+1),H-v*H,bw,v*H);
  }
  vizCtx.shadowBlur=0;
}

/* ═══════════════════════════════════════════════════════
   FALLING NOTES ENGINE
═══════════════════════════════════════════════════════ */
const fallCvs=document.getElementById('fallCvs');
const fCtx=fallCvs.getContext('2d');
let fallingTiles=[];
let learnSong=null, learnActive=false;
let learnStartTime=0, learnHits=0, learnMisses=0, learnMaxCombo=0, learnCombo=0;
let songNoteIndex=0;

function getNoteColumnX(noteName){
  const el=document.querySelector(`[data-note-name="${noteName}"]`); if(!el) return null;
  const er=el.getBoundingClientRect();
  const cr=fallCvs.getBoundingClientRect();
  return {x:er.left-cr.left,w:er.width};
}

function startLearnSong(song){
  learnSong=song; learnActive=true;
  learnHits=0; learnMisses=0; learnCombo=0; learnMaxCombo=0;
  fallingTiles=[]; songNoteIndex=0;
  learnStartTime=performance.now();
  document.getElementById('result-overlay').style.display='none';
  document.getElementById('score-tag').style.display='block';
  document.getElementById('score-tag').textContent='0';
  document.getElementById('prog-wrap').style.display='block';
}

function drawFalling(){
  const W=fallCvs.width, H=fallCvs.height;
  fCtx.clearRect(0,0,W,H);

  if(!learnActive&&!learnSong) return;
  const elapsed=(performance.now()-learnStartTime)/1000;
  const speed=90; 
  const hitY=H-4;

  while(songNoteIndex<learnSong.notes.length){
    const sn=learnSong.notes[songNoteIndex];
    if(elapsed >= sn.time - H/speed){
      const note=BY_NAME[sn.note];
      fallingTiles.push({
        note:sn.note, arrTime:sn.time, dur:sn.dur||.4,
        hit:false, miss:false, hitTime:0, missTime:0,
        color:note?.color||'#fff', key:note?.key||'?',
        isBlack:note?.isBlack||false
      });
      songNoteIndex++;
    } else break;
  }

  const toRemove=[];
  fallingTiles.forEach((tile,idx)=>{
    const timeLeft=tile.arrTime-elapsed;
    const y=hitY - timeLeft*speed;
    const tH=Math.max(20,tile.dur*speed);
    const pos=getNoteColumnX(tile.note);
    if(!pos){return;}
    const {x,w}=pos;

    if(!tile.hit&&!tile.miss&&y>hitY+40){
      tile.miss=true; tile.missTime=elapsed;
      learnMisses++; learnCombo=0;
      showCombo('MISS','miss');
      updateLearnScore();
      document.querySelectorAll(`[data-note-name="${tile.note}"]`)
        .forEach(el=>el.classList.remove('incoming'));
    }

    if(!tile.hit&&!tile.miss&&timeLeft>0&&timeLeft<.6){
      document.querySelectorAll(`[data-note-name="${tile.note}"]`)
        .forEach(el=>el.classList.add('incoming'));
    }

    let alpha=1;
    if(tile.hit) alpha=Math.max(0,1-(elapsed-tile.hitTime)*5);
    if(tile.miss) alpha=Math.max(0,1-(elapsed-tile.missTime)*2.5);
    if(alpha<=0){toRemove.push(idx);return;}

    fCtx.save();
    fCtx.globalAlpha=alpha;

    const col=tile.hit?tile.color : tile.miss?'#ff4444' : tile.color;
    const grd=fCtx.createLinearGradient(x,y-tH,x,y);
    grd.addColorStop(0,col+'ee');
    grd.addColorStop(1,col+'44');
    fCtx.fillStyle=grd;
    if(!tile.hit){
      fCtx.shadowColor=col; fCtx.shadowBlur=tile.isBlack?12:16;
    }
    fCtx.beginPath();
    if(fCtx.roundRect) fCtx.roundRect(x+2,y-tH,w-4,tH,5);
    else fCtx.rect(x+2,y-tH,w-4,tH);
    fCtx.fill();
    fCtx.shadowBlur=0;

    const midY=y-tH/2;
    const bgSize=Math.min(w-8, tH-4, 34);

    if(bgSize>=14){
      fCtx.fillStyle='rgba(0,0,0,0.7)';
      fCtx.beginPath();
      if(fCtx.roundRect) fCtx.roundRect(x+w/2-bgSize/2, midY-bgSize/2, bgSize, bgSize, 3);
      else fCtx.rect(x+w/2-bgSize/2, midY-bgSize/2, bgSize, bgSize);
      fCtx.fill();

      fCtx.fillStyle='#ffffff';
      fCtx.font=`bold ${Math.max(11,bgSize*.55)}px 'Orbitron',monospace`;
      fCtx.textAlign='center';
      fCtx.textBaseline='middle';
      fCtx.shadowColor=col; fCtx.shadowBlur=8;
      fCtx.fillText(tile.key, x+w/2, midY);
      fCtx.shadowBlur=0;

      if(tH>38){
        fCtx.fillStyle='rgba(255,255,255,0.5)';
        fCtx.font=`${Math.max(8,w*.18)}px 'JetBrains Mono',monospace`;
        fCtx.fillText(tile.note.replace(/\d/,''), x+w/2, y-tH+10);
      }
    }
    fCtx.restore();
  });
  toRemove.reverse().forEach(i=>fallingTiles.splice(i,1));

  const lastNoteTime=learnSong.notes[learnSong.notes.length-1].time;
  if(elapsed>lastNoteTime+2.5&&songNoteIndex>=learnSong.notes.length&&fallingTiles.length===0){
    endLearnSong();
  }
}

function checkLearnHit(noteName){
  const elapsed=(performance.now()-learnStartTime)/1000;
  const WIN=0.38;
  for(const tile of fallingTiles){
    if(tile.note===noteName&&!tile.hit&&!tile.miss){
      const diff=Math.abs(tile.arrTime-elapsed);
      if(diff<WIN){
        tile.hit=true; tile.hitTime=elapsed;
        learnCombo++; learnHits++;
        learnMaxCombo=Math.max(learnMaxCombo,learnCombo);
        const isPerf=diff<.1;
        showCombo(isPerf?'PERFECT ✦':'GOOD',isPerf?'perfect':'good');
        spawnParticles(noteName);
        updateLearnScore();
        document.querySelectorAll(`[data-note-name="${noteName}"]`)
          .forEach(el=>el.classList.remove('incoming'));
        return;
      }
    }
  }
}

function updateLearnScore(){
  const total=learnHits+learnMisses;
  const pct=total>0?Math.round(learnHits/total*100):100;
  document.getElementById('score-tag').textContent=`${learnHits}✓ ${learnMisses}✗ ${pct}%`;
  const lastNote=learnSong.notes[learnSong.notes.length-1];
  const elapsed=(performance.now()-learnStartTime)/1000;
  const pctProg=Math.min(1,elapsed/(lastNote.time+2));
  document.getElementById('prog-bar').style.width=(pctProg*100)+'%';
}

function endLearnSong(){
  learnActive=false;
  const total=learnHits+learnMisses;
  const acc=total>0?Math.round(learnHits/total*100):0;
  const grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':acc>=30?'D':'F';
  const gc={S:'#ffd740',A:'#00e5ff',B:'#e040fb',C:'#ffffff',D:'#ff9800',F:'#ff4444'}[grade];
  document.getElementById('ro-grade').textContent=grade;
  document.getElementById('ro-grade').style.color=gc;
  document.getElementById('ro-title').textContent=acc>=70?'WELL DONE!':'KEEP GOING!';
  document.getElementById('ro-hits').textContent=learnHits;
  document.getElementById('ro-miss').textContent=learnMisses;
  document.getElementById('ro-acc').textContent=acc+'%';
  document.getElementById('ro-combo').textContent=learnMaxCombo;
  document.getElementById('result-overlay').style.display='flex';
  document.getElementById('prog-wrap').style.display='none';
}

const comboPop=document.getElementById('combo-pop');
function showCombo(txt,cls){
  comboPop.textContent=txt;
  comboPop.className='combo-pop '+cls+' show';
  clearTimeout(comboPop._t);
  comboPop._t=setTimeout(()=>comboPop.className='combo-pop',600);
}

/* ═══════════════════════════════════════════════════════
   RECORDING
═══════════════════════════════════════════════════════ */
let recording=false, recStart=0, recEvents=[], hasRec=false;
let pbTimers=[];

document.getElementById('btn-rec').addEventListener('click',function(){
  if(recording){
    recording=false; hasRec=recEvents.length>0;
    this.textContent='⏺ REC'; this.classList.remove('rec');
    if(hasRec){
      document.getElementById('btn-play').style.display='';
      document.getElementById('btn-clr').style.display='';
    }
  } else {
    recording=true; recStart=performance.now(); recEvents=[];
    this.textContent='⏹ STOP'; this.classList.add('rec');
    document.getElementById('btn-play').style.display='none';
    document.getElementById('btn-clr').style.display='none';
  }
});

document.getElementById('btn-play').addEventListener('click',function(){
  if(!hasRec) return;
  pbTimers.forEach(clearTimeout); pbTimers=[];
  recEvents.forEach(ev=>{
    const id=setTimeout(()=>{
      if(ev.type==='on') pressKey(ev.n); else releaseKey(ev.n);
    },ev.t);
    pbTimers.push(id);
  });
  const last=recEvents[recEvents.length-1]?.t||1000;
  pbTimers.push(setTimeout(()=>{
    [...pressed].forEach(releaseKey);
  },last+600));
});

document.getElementById('btn-clr').addEventListener('click',()=>{
  recEvents=[]; hasRec=false;
  document.getElementById('btn-play').style.display='none';
  document.getElementById('btn-clr').style.display='none';
});

/* ═══════════════════════════════════════════════════════
   METRONOME
═══════════════════════════════════════════════════════ */
let metroId=null, metroBeat=0;
function startMetro(bpm){
  stopMetro(); if(!bpm) return;
  const ms=60000/bpm;
  const dots=[0,1,2,3].map(i=>document.getElementById('md'+i));
  metroId=setInterval(()=>{
    dots.forEach(d=>d.classList.remove('beat'));
    dots[metroBeat%4].classList.add('beat');
    const ac=getAC(),t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain();
    o.frequency.value=metroBeat%4===0?1100:750;
    g.gain.setValueAtTime(.08,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.05);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+.06);
    metroBeat++;
  },ms);
}
function stopMetro(){
  if(metroId){clearInterval(metroId);metroId=null;metroBeat=0;}
  [0,1,2,3].forEach(i=>{const d=document.getElementById('md'+i);if(d)d.classList.remove('beat');});
}
document.getElementById('sel-bpm').addEventListener('change',e=>startMetro(parseInt(e.target.value)));

function switchMode(mode){
  appMode=mode;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  document.getElementById('ear-panel').style.display=mode==='ear'?'block':'none';
  document.getElementById('song-panel').style.display=mode==='learn'?'block':'none';
  document.getElementById('score-tag').style.display='none';
  document.getElementById('prog-wrap').style.display='none';
  document.getElementById('result-overlay').style.display='none';
  if(mode==='learn'){ buildSongList(); }
  if(mode==='ear'){ earScore=0;earTotal=0;buildEarUI();startEarRound(); }
  if(mode!=='learn'){
    learnActive=false; fallingTiles=[];
    document.querySelectorAll('[data-note-name]').forEach(el=>el.classList.remove('incoming'));
    fCtx.clearRect(0,0,fallCvs.width,fallCvs.height);
  }
}

];

function mk(str,dur){
  const ns=str.split(',');
  const out=[]; let t=0;
  ns.forEach(s=>{
    const tn=s.trim();
    if(tn!=='_') out.push({note:tn,time:t,dur:dur*.9});
    t+=dur;
  });
  return out;
}

function buildSongList(){
  selectedSong=SONGS[0];
  const el=document.getElementById('song-list');
  el.innerHTML='';
  SONGS.forEach(s=>{
    const row=document.createElement('div');
    row.className='song-row'+(s===selectedSong?' sel':'');
    row.innerHTML=`<span class="sr-name">${s.name}</span>
      <span class="sr-diff diff-${s.diff.toLowerCase()}">${s.diff}</span>`;
    row.addEventListener('click',()=>{
      selectedSong=s;
      document.querySelectorAll('.song-row').forEach(r=>r.classList.remove('sel'));
      row.classList.add('sel');
    });
    el.appendChild(row);
  });
}

document.getElementById('sp-start').addEventListener('click',function(){
  if(!selectedSong) return;
  document.getElementById('song-panel').style.display='none';
  doCountdown(()=>startLearnSong(selectedSong));
});
document.getElementById('sp-cancel').addEventListener('click',()=>switchMode('free'));

document.getElementById('ro-retry').addEventListener('click',function(){
  document.getElementById('result-overlay').style.display='none';
  if(learnSong) doCountdown(()=>startLearnSong(learnSong));
});
document.getElementById('ro-back').addEventListener('click',()=>switchMode('free'));

function doCountdown(cb){
  const cd=document.getElementById('countdown');
  const n=document.getElementById('cd-n');
  cd.style.display='flex'; let count=3;
  n.textContent=count; resetAnim(n);
  const iv=setInterval(()=>{
    count--;
    if(count<=0){clearInterval(iv);cd.style.display='none';cb();}
    else{n.textContent=count;resetAnim(n);}
  },1000);
}
function resetAnim(el){
  el.style.animation='none'; void el.offsetWidth;
  el.style.animation='cdAnim .85s ease-out forwards';
}

/* ═══════════════════════════════════════════════════════
   EAR TRAINING
═══════════════════════════════════════════════════════ */
const EAR_POOL=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5'];
let earScore=0,earTotal=0,earTarget=null,earAnswered=false;

function buildEarUI(){
  const ch=document.getElementById('ep-choices');
  ch.innerHTML='';
  EAR_POOL.forEach(n=>{
    const b=document.createElement('button');
    b.className='epc'; b.textContent=n.replace(/\d/,'');
    b.dataset.fullNote=n;
    b.addEventListener('click',()=>checkEarAnswer(n));
    ch.appendChild(b);
  });
}

function startEarRound(){
  earAnswered=false;
  earTarget=EAR_POOL[Math.floor(Math.random()*EAR_POOL.length)];
  document.getElementById('ep-fb').textContent='';
  document.getElementById('ep-fb').style.color='';
  document.querySelectorAll('.epc').forEach(b=>{
    b.classList.remove('correct','wrong'); b.disabled=false;
  });
  document.getElementById('ep-next').style.display='none';
  document.getElementById('ep-play').style.display='';
  playEarNote();
}

function playEarNote(){
  const note=BY_NAME[earTarget]; if(!note) return;
  startNote(note);
  setTimeout(()=>stopNote(earTarget),900);
}

function checkEarAnswer(noteName){
  if(earAnswered) return;
  earAnswered=true; earTotal++;
  const base=noteName.replace(/\d/,'');
  const tbase=earTarget.replace(/\d/,'');
  const correct=base===tbase;
  if(correct) earScore++;
  document.querySelectorAll('.epc').forEach(b=>{
    if(b.textContent===tbase) b.classList.add('correct');
    else if(b.textContent===base&&!correct) b.classList.add('wrong');
    b.disabled=true;
  });
  const fb=document.getElementById('ep-fb');
  fb.textContent=correct?`✓ Correct! That's ${earTarget}`:`✗ Nope — it was ${earTarget}`;
  fb.style.color=correct?'#69ff47':'#ff4444';
  document.getElementById('ep-score').textContent=`Score: ${earScore} / ${earTotal} (${Math.round(earScore/earTotal*100)}%)`;
  document.getElementById('ep-next').style.display='';
  document.getElementById('ep-play').style.display='none';
  document.querySelectorAll(`[data-note-name="${earTarget}"]`).forEach(el=>{
    el.classList.add('pressed');
    setTimeout(()=>el.classList.remove('pressed'),800);
  });
}

document.getElementById('ep-play').addEventListener('click',playEarNote);
document.getElementById('ep-next').addEventListener('click',startEarRound);

function buildGuideStrip(){

  strip.innerHTML='';

  const label=document.createElement('span');
  label.className='guide-label'; label.textContent='Keyboard:';
  strip.appendChild(label);

  const row=document.createElement('div');
  row.className='guide-row';

  NOTES.forEach(note=>{
    const g=document.createElement('div');
    g.className='gkey '+(note.isBlack?'gblack':'gwhite');
    g.style.borderColor=note.color+'44';
    g.innerHTML=`<span class="gn" style="color:${note.color}88">${note.note}</span>
                 <span class="gk" style="color:${note.color}">${note.key}</span>`;
    row.appendChild(g);

    if(note.note==='B3'||note.note==='B4'){
      const sep=document.createElement('div');
      sep.className='guide-sep'; row.appendChild(sep);
    }

  strip.appendChild(row);
}
