<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gender Detector Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handtrack.js/0.0.5/handtrack.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    
    /* Back to Hub Button */
    .back-to-hub {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 8px 18px;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .back-to-hub:hover {
      background: rgba(255, 255, 255, 0.35);
      border-color: rgba(255, 255, 255, 0.8);
      transform: scale(1.05);
    }
    
    .container {
      background: white;
      border-radius: 30px;
      padding: 50px 40px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    
    h1 {
      color: #333;
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #999;
      margin-bottom: 35px;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }
    
    .video-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1/1;
      border-radius: 20px;
      background: #000;
      margin: 25px auto;
      border: 4px solid #667eea;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
      overflow: hidden;
      display: none;
    }

    #camera {
      width: 100%;
      height: 100%;
      display: none;
      border-radius: 16px;
      transform: scaleX(-1);
    }

    #resultVideo {
      width: 100%;
      height: 100%;
      display: none;
      border-radius: 16px;
    }

    /* Emoji Overlay on Camera */
    .emoji-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 100px;
      z-index: 15;
      display: none;
      animation: bounce 0.8s ease;
    }

    .emoji-overlay.show {
      display: block;
    }
    
    /* Face Detection Animation */
    .face-detection {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border: 3px solid #667eea;
      border-radius: 50%;
      display: none;
      z-index: 10;
      animation: scanPulse 2s infinite;
    }

    .face-detection.active {
      display: block;
    }

    @keyframes scanPulse {
      0%, 100% {
        width: 120px;
        height: 120px;
        border-color: #667eea;
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
      }
      50% {
        width: 160px;
        height: 160px;
        border-color: #764ba2;
        box-shadow: 0 0 40px rgba(118, 75, 162, 0.6);
      }
    }

    .face-detection::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #764ba2;
      border-radius: 50%;
      animation: rotateScan 3s linear infinite;
      top: -2px;
      left: -2px;
    }

    @keyframes rotateScan {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #667eea;
      font-weight: bold;
      font-size: 14px;
      z-index: 11;
      display: none;
    }

    .loading-text.active {
      display: block;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status {
      color: #667eea;
      font-weight: 600;
      margin: 20px 0;
      height: 30px;
      font-size: 1.1rem;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary {
      background: #f5f5f5;
      color: #667eea;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.1);
    }

    button.secondary:hover:not(:disabled) {
      background: #efefef;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
    }
    
    .result {
      display: none !important;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .emoji {
      font-size: 120px;
      animation: bounce 0.8s ease;
      margin: 0;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .note {
      background: #f0f4ff;
      color: #667eea;
      border-left: 5px solid #667eea;
      border-radius: 10px;
      padding: 15px;
      margin-top: 25px;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .hidden {
      display: none !important;
    }

    .try-again-btn {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<!-- Back to Hub Button -->
<a href="crazy.html" class="back-to-hub">← Back to Hub</a>

<div class="container">
  <h1>👁️ Gender Detector</h1>
  <p class="subtitle">Advanced Analysis System ✨</p>
  
  <div class="video-container" id="videoContainer">
    <video id="camera" autoplay playsinline></video>
    <video id="resultVideo"></video>
    <div class="emoji-overlay" id="emojiOverlay"></div>
    <div class="face-detection" id="faceDetection">
      <div class="loading-text" id="loadingText">SCANNING...</div>
    </div>
  </div>
  
  <div class="status" id="status"></div>
  
  <div class="button-group" id="buttonGroup">
    <button onclick="openCamera()">📷 Start Camera</button>
    <button onclick="stop()" class="secondary">⏹️ Stop</button>
  </div>
  
  <div class="result" id="result">
    <div class="emoji" id="emoji"></div>
  </div>
  
  <div class="note">
    ℹ️ Advanced AI-based detection system. For entertainment purposes only! 😄
  </div>

  <button onclick="tryAgain()" class="secondary try-again-btn hidden" id="tryAgainBtn">🔄 Try Again</button>
</div>

<script>
  const videoContainer = document.getElementById('videoContainer');
  const camera = document.getElementById('camera');
  const resultVideo = document.getElementById('resultVideo');
  const faceDetection = document.getElementById('faceDetection');
  const loadingText = document.getElementById('loadingText');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const buttonGroup = document.getElementById('buttonGroup');
  const tryAgainBtn = document.getElementById('tryAgainBtn');
  
  const patterns = [
    [0, 1, 2], // Boy, Girl, Sus
    [0, 2, 1], // Boy, Sus, Girl
    [1, 0, 2], // Girl, Boy, Sus
    [1, 2, 0], // Girl, Sus, Boy
    [2, 0, 1], // Sus, Boy, Girl
    [2, 1, 0]  // Sus, Girl, Boy
  ];
  
  let currentPatternIndex = 0;
  let currentPositionInPattern = 0;
  
  let model = null;
  let stream = null;
  let isAnalyzing = false;
  let currentPattern = [];
  let patternIndex = 0;

  // Initialize Face Detection Model
  async function initModel() {
    try {
      const modelParams = {
        flipHorizontal: true,
        maxNumBoxes: 20,
        iouThreshold: 0.5,
        scoreThreshold: 0.6,
      };
      model = await handTrack.load(modelParams);
      console.log('Face detection model loaded');
    } catch (error) {
      console.error('Model load error:', error);
    }
  }

  function generateRandomPattern() {
    // All possible patterns: 123, 132, 213, 231, 312, 321
    // 1 = Boy, 2 = Girl, 3 = Video
    const patterns = [
      [1, 2, 3],  // Boy, Girl, Video
      [1, 3, 2],  // Boy, Video, Girl
      [2, 1, 3],  // Girl, Boy, Video
      [2, 3, 1],  // Girl, Video, Boy
      [3, 1, 2],  // Video, Boy, Girl
      [3, 2, 1]   // Video, Girl, Boy
    ];
    
    const randomPattern = patterns[Math.floor(Math.random() * patterns.length)];
    console.log('Pattern selected:', randomPattern);
    return randomPattern;
  }

  async function openCamera() {
    try {
      status.innerText = '📷 Initializing camera...';
      
      stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          width: { ideal: 450 },
          height: { ideal: 450 },
          facingMode: 'user'
        }
      });
      
      camera.srcObject = stream;
      camera.style.display = 'block';
      videoContainer.style.display = 'block';
      buttonGroup.style.display = 'none';
      status.innerText = '✅ Camera ready! Analyzing...';
      
      // Auto-start detection after 1.5 seconds
      setTimeout(startDetection, 1500);
    } catch (err) {
      status.innerText = '❌ Camera access denied!';
    }
  }

  function startDetection() {
    if (isAnalyzing) return;
    isAnalyzing = true;
    
    status.innerText = '🔍 Detecting face...';
    faceDetection.classList.add('active');
    loadingText.classList.add('active');
    document.getElementById('emojiOverlay').classList.remove('show');
    
    // Run face detection
    detectFace();
  }

  async function detectFace() {
    if (!model) {
      // Fallback if model not loaded
      setTimeout(() => {
        showRandomGender();
      }, 3000);
      return;
    }

    const checkInterval = setInterval(async () => {
      try {
        const predictions = await model.estimateHands(camera, true);
        if (predictions.length > 0) {
          clearInterval(checkInterval);
          status.innerText = '✅ Face detected!';
          setTimeout(() => {
            showRandomGender();
          }, 500);
        }
      } catch (error) {
        console.error('Detection error:', error);
      }
    }, 500);

    // Timeout after 5 seconds
    setTimeout(() => {
      clearInterval(checkInterval);
      if (isAnalyzing) {
        status.innerText = '✅ Analysis complete!';
        showRandomGender();
      }
    }, 5000);
  }

  function showRandomGender() {
    faceDetection.classList.remove('active');
    loadingText.classList.remove('active');
    
    // Multiple emoji options for variety
    const boyEmojis = ['👦', '🧒', '👨', '🤠', '👨‍🦱'];
    const girlEmojis = ['👧', '👩', '👱‍♀️', '💇‍♀️', '👩‍🦰'];
    
    const rand = Math.random();
    let emoji = '';
    let isVideo = false;
    
    if (rand < 0.33) {
      // Boy - show emoji overlay on camera
      emoji = boyEmojis[Math.floor(Math.random() * boyEmojis.length)];
      isVideo = false;
    } else if (rand < 0.66) {
      // Girl - show emoji overlay on camera
      emoji = girlEmojis[Math.floor(Math.random() * girlEmojis.length)];
      isVideo = false;
    } else {
      // Sus - show video only, no emoji
      isVideo = true;
    }
    
    isAnalyzing = false;
    
    if (isVideo) {
      // Show video only - no emoji
      camera.style.display = 'none';
      document.getElementById('emojiOverlay').classList.remove('show');
      
      resultVideo.src = './6.mp4';
      resultVideo.style.display = 'block';
      
      resultVideo.play().catch(error => {
        console.log('Video play error:', error);
      });
    } else {
      // Show emoji overlay on camera
      camera.style.display = 'block';
      resultVideo.style.display = 'none';
      document.getElementById('emojiOverlay').innerText = emoji;
      document.getElementById('emojiOverlay').classList.add('show');
    }
    
    status.innerText = '✅ Detection Complete!';
    buttonGroup.style.display = 'none';
    tryAgainBtn.classList.remove('hidden');
  }

  function stop() {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      videoContainer.style.display = 'none';
      camera.srcObject = null;
      status.innerText = '⏹️ Stopped';
      document.getElementById('emojiOverlay').classList.remove('show');
      faceDetection.classList.remove('active');
      buttonGroup.style.display = 'flex';
      tryAgainBtn.classList.add('hidden');
      isAnalyzing = false;
    }
  }

  function tryAgain() {
    if (stream) {
      camera.style.display = 'block';
      resultVideo.style.display = 'none';
      document.getElementById('emojiOverlay').classList.remove('show');
      status.innerText = '🔍 Detecting face...';
      tryAgainBtn.classList.add('hidden');
      startDetection();
    } else {
      openCamera();
    }
  }

  // Initialize on load
  window.addEventListener('load', () => {
    initModel();
  });
</script>

</body>
</html>
