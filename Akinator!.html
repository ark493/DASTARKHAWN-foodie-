<script>

// ============================================================
//  SHARED UI
// ============================================================
const bubble     = document.getElementById('speech-bubble');
const actionArea = document.getElementById('action-area');
const avatar     = document.getElementById('genie-avatar');
let isProcessing = false;

function transitionUI(titleHTML, textHTML, buttonsHTML, isThinking = false) {
    bubble.classList.remove('fade-in');
    actionArea.classList.remove('fade-in');
    bubble.classList.add('fade-out');
    actionArea.classList.add('fade-out');

    setTimeout(() => {
        if (isThinking) {
            bubble.innerHTML = `<div class="py-4"><div class="spinner mb-4"></div>
                <h1 class="text-xl font-black text-amber-400 animate-pulse">${titleHTML}</h1></div>`;
            actionArea.innerHTML = '';
        } else {
            bubble.innerHTML = `<h1 class="text-xl font-black text-amber-400 mb-2">${titleHTML}</h1>
                <p class="text-[1.1rem] font-semibold text-slate-200 leading-snug">${textHTML}</p>`;
            actionArea.innerHTML = buttonsHTML;
        }
        bubble.classList.remove('fade-out');
        actionArea.classList.remove('fade-out');
        bubble.classList.add('fade-in');
        actionArea.classList.add('fade-in');
        isProcessing = false;   // unlock buttons after every transition
    }, 300);
}

// ============================================================
//  🔮 OBJECT GAME — Pure decision tree, zero network calls
//  KEY FIX: objAns does NOT call askObjQ() directly.
//  It calls transitionUI() which resets isProcessing=false,
//  then inside that callback we trigger the next question.
// ============================================================

/*
  TREE FORMAT:
    Each node: { q, y, n }
      q  = question string
      y  = key of next node if YES  (or "GUESS:Text" to reveal answer)
      n  = key of next node if NO   (or "GUESS:Text" to reveal answer)
*/
const OBJ = {

  // Non-vehicles

  outdoor_1: { q:"Is it a building or structure?",            y:"GUESS:House / Building / Bridge 🏠", n:"outdoor_2" },

  // Non-electronic indoor
  nonelec_1: { q:"Is it furniture (bed, chair, table, shelf)?", y:"furn_1",   n:"nonelec_2" },

  nonelec_2: { q:"Is it something you write with or on?",     y:"write_1",    n:"nonelec_3" },

let objNode  = "start";
let objCount = 0;

function startObjectGame() {
    objNode  = "start";
    objCount = 0;
    avatar.textContent = "🔮";
    transitionUI(
        "Object Guesser! 🔮",
        "Think of ANY object in your mind... Don't tell me! 🧠<br>I'll figure it out with Yes / No questions!",
        `<button onclick="askObjQ()" class="btn-magic btn-action w-full font-black text-lg py-4 px-6 rounded-2xl">I'm Ready! Let's Go!</button>
         <button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-amber-500/30 text-amber-400 font-bold py-3 rounded-xl shadow-lg mt-2">← Go Back</button>`
    );
}

// Called to DISPLAY the current node's question
// ⚠️ NO isProcessing check here — this is internal, not a button handler
function askObjQ() {
    const node = OBJ[objNode];
    if (!node) { showObjGuess("Something mysterious... 🌌"); return; }

    objCount++;
    const qTitle = `Question <span class="text-white bg-amber-500 px-2 py-0.5 rounded-md mx-1 shadow-sm">${objCount}</span> 🧐`;
    transitionUI(qTitle, node.q, `
        <div class="flex gap-4 w-full">
            <button onclick="objAns('y')" class="btn-action flex-1 bg-emerald-600/90 border border-emerald-400/50 hover:bg-emerald-500 text-white text-xl font-black py-5 rounded-2xl shadow-[0_8px_20px_rgba(5,150,105,0.4)]">YES</button>
            <button onclick="objAns('n')" class="btn-action flex-1 bg-rose-600/90 border border-rose-400/50 hover:bg-rose-500 text-white text-xl font-black py-5 rounded-2xl shadow-[0_8px_20px_rgba(225,29,72,0.4)]">NO</button>
        </div>
        <button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-slate-700 text-slate-400 font-bold py-3 rounded-xl shadow-lg mt-3">Give Up 🏳️</button>
    `);
}

// Called by YES/NO buttons
function objAns(ans) {
    if (isProcessing) return;   // stop double-tap on buttons only
    isProcessing = true;

    const node = OBJ[objNode];
    if (!node) { showObjGuess("Something mysterious... 🌌"); return; }

    const next = node[ans];     // next is either a key like "animal_1" or "GUESS:Dog 🐶"

    if (!next || next === "") {
        showObjGuess("Something interesting... 🌟");
        return;
    }

    if (next.startsWith("GUESS:")) {
        // Direct guess — show it
        // isProcessing will be reset by transitionUI inside showObjGuess
        showObjGuess(next.replace("GUESS:", "").trim());
    } else {
        // Move to next node, then show its question
        // ⚡ KEY: We use setTimeout so transitionUI's 300ms fade can reset isProcessing FIRST
        objNode = next;
        setTimeout(() => { askObjQ(); }, 10);  // tiny delay to let the call stack clear
    }
}

function showObjGuess(guess) {
    avatar.textContent = "🎉";
    confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#fbbf24','#f59e0b','#ffffff','#7c3aed'] });
    transitionUI(
        "My Final Answer! 🔮",
        `Is it...<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>${guess}?!</span>`,
        `<div class="flex gap-4 w-full">
            <button onclick="objRight()" class="btn-action flex-1 bg-emerald-600/90 border border-emerald-400/50 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl">✅ Yes!</button>
            <button onclick="objWrong()" class="btn-action flex-1 bg-rose-600/90 border border-rose-400/50 hover:bg-rose-500 text-white font-black py-4 rounded-2xl">❌ Nope!</button>
        </div>`
    );
}

function objRight() {
    confetti({ particleCount: 250, spread: 100, origin: { y: 0.5 }, colors: ['#fbbf24','#f59e0b','#ffffff','#10b981'] });
    avatar.textContent = "😎";
    transitionUI("VICTORY! 🏆", "My magic is unstoppable! The Genie always wins! 🔮✨",
        `<button onclick="startObjectGame()" class="btn-magic btn-action w-full font-black text-lg py-4 px-6 rounded-2xl">Play Again 🔄</button>
         <button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-slate-700 text-slate-400 font-bold py-3 rounded-xl shadow-lg mt-2">← Main Menu</button>`);
}
function objWrong() {
    avatar.textContent = "😤";
    transitionUI("The Genie is Defeated! 😤", "You outsmarted my ancient magic... What were you thinking of? 🤔",
        `<button onclick="startObjectGame()" class="btn-magic btn-action w-full font-black text-lg py-4 px-6 rounded-2xl">Play Again 🔄</button>
         <button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-slate-700 text-slate-400 font-bold py-3 rounded-xl shadow-lg mt-2">← Main Menu</button>`);
}

const results = {
    res_ganesh:  "Everyone's Favorite & Our Visionary Director! 🌟<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Ganesh Sir!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for your incredible guidance and leadership!</span>",
    res_vimal:   "Loved and respected by all! ✨<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Vimal Sir!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for your amazing support!</span>",
    res_soroj:   "Our Beloved & Respected Principal! 🎓<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Soroj Sir!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for your constant support and dedication!</span>",
    res_lahri:   "Everyone's favorite Ma'am! 🌟<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Lahri Ma'am!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for your wonderful guidance!</span>",
    res_esha:    "Super talented & Aditya Sir's batchmate! 📚<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Esha Ma'am!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for teaching the 6th sem!</span>",
    res_aditya:  "Such a cool & friendly vibe! ☕<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Aditya Sir!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for the amazing Java classes!</span>",
    res_sandiya: "Super friendly & awesome practicals! 💻<br><span class='text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-300 to-yellow-500 mt-3 block'>Sandiya Ma'am!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Thank you for being so approachable!</span>",
    res_unknown: "You stumped my magic! 🙏<br><span class='text-3xl text-rose-500 font-black mt-3 block'>I couldn't guess!</span><br><span class='text-sm text-slate-300 font-bold mt-2 block'>Please forgive this humble genie!</span>"
};
let currentTreeNode = 'q1';
let targetResult    = null;
let questionsAsked  = 0;
let shuffledRandoms = [];

function startGame(mode) {
    if (mode === 'object') {
        startObjectGame();
    } else {
        transitionUI("Magical Choice! ✨", "Please tell me, are you a Respected Teacher or a Student?",
        `<button onclick="startTeacherPath()" class="btn-magic btn-action w-full font-bold py-4 px-6 rounded-2xl mb-3">📚 I am a Teacher</button>
         <button onclick="startStudentPath()" class="btn-action w-full bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-slate-500 text-slate-200 font-bold py-4 px-6 rounded-2xl shadow-lg">🎒 I am a Student</button>`);
    }
}

function startStudentPath() {
    transitionUI("Students Section! 🎒", "The student paths are currently being enchanted! Check back soon.",
    `<button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-amber-500/30 text-amber-400 hover:text-amber-300 font-bold py-4 rounded-xl shadow-lg">Go Back</button>`);
}

function startTeacherPath() {
    currentTreeNode = 'q1';
    targetResult    = null;
    questionsAsked  = 0;
    shuffledRandoms = [...randomQuestions].sort(() => 0.5 - Math.random());
    transitionUI("Namaste! 🙏", "Greetings, Respected Sir/Ma'am! ✨ Let the magic begin. Please answer 6 simple questions so I can guess who you are.",
    `<button onclick="askQuestion()" class="btn-magic btn-action w-full font-black text-lg py-4 px-6 rounded-2xl">Let's Begin!</button>`);
}

function askQuestion() {
    if (questionsAsked >= 6) {
        transitionUI("Reading your mind... 🔮", "", "", true);
        avatar.textContent = "🧘‍♂️";
        setTimeout(() => { showFinalResult(); }, 2500);
        return;
    }
    let questionText = "";
    let isRandom = false;
    if (questionsAsked === 1 || questionsAsked === 4 || targetResult !== null) {
        questionText = shuffledRandoms.pop();
        isRandom = true;
    } else {
        questionText = tree[currentTreeNode].text;
    }
    const qTitle = `Question <span class="text-white bg-amber-500 px-2 py-0.5 rounded-md mx-1 shadow-sm">${questionsAsked + 1}</span> of 6 🧐`;
    transitionUI(qTitle, questionText,
    `<div class="flex gap-4 w-full">
        <button onclick="handleAnswer('yes', ${isRandom})" class="btn-action flex-1 bg-emerald-600/90 border border-emerald-400/50 hover:bg-emerald-500 text-white text-xl font-black py-5 rounded-2xl shadow-[0_8px_20px_rgba(5,150,105,0.4)]">YES</button>
        <button onclick="handleAnswer('no', ${isRandom})"  class="btn-action flex-1 bg-rose-600/90 border border-rose-400/50 hover:bg-rose-500 text-white text-xl font-black py-5 rounded-2xl shadow-[0_8px_20px_rgba(225,29,72,0.4)]">NO</button>
    </div>`);
}

function handleAnswer(answer, wasRandom) {
    if (isProcessing) return;
    isProcessing = true;
    if (!wasRandom && targetResult === null) {
        const nextNode = tree[currentTreeNode][answer];
        if (nextNode && nextNode.startsWith('res_')) { targetResult = nextNode; }
        else if (nextNode) { currentTreeNode = nextNode; }
    }
    questionsAsked++;
    askQuestion();
}

function showFinalResult() {
    avatar.textContent = "🎉";
    const finalMessage = targetResult ? results[targetResult] : results['res_unknown'];
    if (targetResult) {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#fbbf24','#f59e0b','#ffffff','#d97706'] });
    }
    transitionUI("I KNOW YOU! 🔮", finalMessage,
    `<button onclick="location.reload()" class="btn-action w-full bg-slate-900/80 border border-amber-500/30 text-amber-400 hover:text-amber-300 font-bold py-4 rounded-xl shadow-lg mt-2">Play Again 🔄</button>`);
}
</script>
</body>
</html>
