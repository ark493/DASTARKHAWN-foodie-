 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Dastarkhwan</title>
    
    <!-- UI Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Premium Dhaba Theme */
        body { 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            background: #fdfcf8; /* Soft Clean Dhaba Base */
            background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .main-ui { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        
        /* Premium Bento Glass Card */
        .card-box { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            width: 100%; 
            max-width: 440px; 
            padding: 60px 40px; 
            border-radius: 4rem; 
            box-shadow: 0 40px 100px rgba(6, 95, 70, 0.08); 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            animation: bentoPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes bentoPop { 
            from { opacity: 0; transform: scale(0.95) translateY(20px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* Icon Story Bubble */
        .icon-bubble {
            width: 90px; 
            height: 90px; 
            border-radius: 50%;
            background: #ffffff; 
            border: 4px solid #10b981;
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0 auto 35px; 
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.12);
            color: #10b981; 
            font-size: 2.2rem;
            transition: 0.4s ease;
        }
        .icon-bubble:hover { transform: scale(1.1); border-color: #d4af37; color: #d4af37; }

        /* Modern Desi Inputs */
        .m-input { 
            width: 100%; 
            padding: 22px 20px 22px 65px; 
            border-radius: 2rem; 
            background: #ffffff; 
            border: 2px solid #f1f5f9; 
            outline: none; 
            font-weight: 800; 
            transition: 0.3s; 
            color: #1e293b; 
            font-size: 1rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        .m-input:focus { 
            border-color: #10b981; 
            box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.08); 
        }
        
        .input-group:focus-within i { color: #10b981; }

        /* Premium Emerald Action Button */
        .btn-enter { 
            width: 100%; 
            background: #065f46; 
            color: white; 
            padding: 22px; 
            border-radius: 2rem; 
            font-weight: 900; 
            font-size: 1.1rem; 
            margin-top: 35px; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            cursor: pointer; 
            border: none; 
            box-shadow: 0 20px 40px rgba(6, 95, 70, 0.2);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .btn-enter:hover { 
            transform: translateY(-6px); 
            background: #044332;
            box-shadow: 0 25px 50px rgba(6, 95, 70, 0.3); 
        }
        .btn-enter:active { transform: scale(0.96); }

        /* Full Screen Loader */
        #loading-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #fdfcf8; 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
        }
        
        /* Validation Shake */
        .shake { animation: shake 0.4s ease; border-color: #ef4444 !important; background: #fffcfc; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* Back Button Pill */
        .back-pill {
            position: absolute; 
            top: 40px; 
            left: 40px;
            width: 45px; 
            height: 45px; 
            background: white;
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #94a3b8; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; 
            z-index: 10;
        }
        .back-pill:hover { color: #ea580c; transform: translateX(-4px); }
    </style>
</head>
<body>

    <!-- Professional Loader Overlay -->
    <div id="loading-overlay">
        <lottie-player 
            src="food_carousel.json" 
            background="transparent" 
            speed="1" 
            style="width: 250px; height: 250px;" 
            loop 
            autoplay>
        </lottie-player>
        <div class="mt-4 text-[10px] font-black text-emerald-800 tracking-[0.4em] uppercase animate-pulse">Setting the Dastarkhwan...</div>
    </div>

    <!-- Main UI Container -->
    <div class="main-ui">
        <div class="card-box">
            <!-- Back to Landing Page -->
            <a href="index.html" class="back-pill">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            
            <!-- Welcome Header -->
            <div class="mb-12">
                <div class="icon-bubble">
                    <i class="fa-solid fa-user-pen"></i>
                </div>
                
                <h1 class="text-4xl font-black text-slate-800 tracking-tight leading-none" id="t-welcome">Welcome!</h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mt-5" id="t-sub">Aapka Naam Kya Hai?</p>
            </div>
            
            <!-- Form Section -->
            <div class="space-y-6">
                <div class="relative input-group">
                    <i class="fa-solid fa-signature absolute left-7 top-1/2 -translate-y-1/2 text-slate-300 text-xl pointer-events-none transition-all duration-300"></i>
                    <input type="text" id="inputName" placeholder="Enter Name" class="m-input" autocomplete="off">
                </div>
                
                <!-- Action Button -->
                <button onclick="saveAndGo()" class="btn-enter" id="t-btn">
                    <span id="btn-text">Enter Portal</span> 
                    <i class="fa-solid fa-chevron-right text-xs opacity-40"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Language Dictionary (Matches index.html logic)
        const dict = {
            en: { welcome: "Welcome!", sub: "Tell us about yourself", name: "Your Name?", btn: "Enter Dastarkhwan" },
            hi: { welcome: "स्वागत है!", sub: "आपका शुभ नाम क्या है?", name: "नाम दर्ज करें", btn: "प्रवेश करें" },
            or: { welcome: "ସ୍ଵାଗତମ୍!", sub: "ଆପଣଙ୍କ ନାମ କୁହନ୍ତୁ", name: "ନାମ ଲେଖନ୍ତୁ", btn: "ପ୍ରବେଶ" }
        };

        window.onload = () => {
            // Fetch language from localStorage
            const l = localStorage.getItem('dastarkhwan_lang') || 'en';
            const t = dict[l] || dict['en'];
            
            document.getElementById('t-welcome').innerText = t.welcome;
            document.getElementById('t-sub').innerText = t.sub;
            document.getElementById('inputName').placeholder = t.name;
            
            // Fixed button text update (No Red Errors)
            const btnText = document.getElementById('btn-text');
            if(btnText) btnText.innerText = t.btn;
        };

        function saveAndGo() {
            const n = document.getElementById("inputName");

            // Empty Validation
            if (!n.value.trim()) { 
                n.classList.add('shake');
                n.focus();
                setTimeout(() => n.classList.remove('shake'), 500); 
                return; 
            }

            // CRITICAL: Dashboard (hun2.js) looks for 'dastarkhwan_user'
            localStorage.setItem("dastarkhwan_user", n.value.trim());

            // Show Premium Loader
            document.getElementById('loading-overlay').style.display = "flex";

            // Redirect after loader finish
            setTimeout(() => {
                window.location.href = "hun2.html";
            }, 3000);
        }
    </script>
</body>
</html>
