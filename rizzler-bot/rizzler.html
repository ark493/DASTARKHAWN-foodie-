 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rizzler – Desi Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet" />
<style>
  /* Back to Hub Button */
  .back-to-hub {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(249, 115, 22, 0.2);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(249, 115, 22, 0.5);
    border-radius: 30px;
    padding: 8px 18px;
    color: #f97316;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }
  .back-to-hub:hover {
    background: rgba(249, 115, 22, 0.35);
    border-color: #f97316;
    color: white;
    transform: scale(1.05);
  }

  /* ━━━ RESET & BASE ━━━ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 30% 10%, #0f0f1a, #06060c);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    padding: 16px;
  }

  /* ━━━ MAIN WIDGET ━━━ */
  .rizzler-widget {
    width: 420px;
    max-width: 100%;
    background: rgba(10, 10, 18, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(249, 115, 22, 0.25);
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 40px 70px rgba(249, 115, 22, 0.2), 0 20px 40px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    height: 640px;
    transition: all 0.2s;
  }

  /* ━━━ HEADER ━━━ */
  .rz-header {
    background: linear-gradient(145deg, #1c1428, #0f1420);
    border-bottom: 1px solid #2e2e4a;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    position: relative;
  }
  .rz-header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 20%;
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f97316, #d946ef, transparent);
    border-radius: 2px;
  }

  .rz-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #d946ef, #3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 8px 20px rgba(249, 115, 22, 0.6);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .rz-avatar::after {
    content: '';
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 14px;
    height: 14px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid #0a0a12;
    box-shadow: 0 0 10px #22c55e;
  }

  .rz-info h2 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #f97316, #d946ef, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
    letter-spacing: 0.5px;
  }
  .rz-info p {
    font-size: 0.75rem;
    color: #7a7aa0;
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rz-info p span {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 10px #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ━━━ MESSAGES AREA ━━━ */
  .rz-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
    background: rgba(2, 2, 8, 0.6);
  }
  .rz-messages::-webkit-scrollbar { width: 5px; }
  .rz-messages::-webkit-scrollbar-track { background: #1a1a2a; border-radius: 10px; }
  .rz-messages::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }

  /* Message rows */
  .rz-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: slideUp 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
  }
  .rz-row.user { flex-direction: row-reverse; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rz-mini-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #d946ef);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(249, 115, 22, 0.5);
  }

  .rz-bubble {
    max-width: 78%;
    padding: 12px 18px;
    font-size: 0.95rem;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
    font-weight: 500;
  }
  .rz-row.bot .rz-bubble {
    background: #1e1e30;
    border: 1px solid rgba(249, 115, 22, 0.3);
    border-radius: 24px 24px 24px 6px;
    color: #eee;
    box-shadow: 0 6px 14px rgba(0,0,0,0.5);
  }
  .rz-row.user .rz-bubble {
    background: linear-gradient(135deg, #d946ef, #f97316);
    border-radius: 24px 24px 6px 24px;
    color: #fff;
    box-shadow: 0 6px 14px rgba(217, 70, 239, 0.4);
  }

  /* Typing indicator */
  .rz-typing {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 14px 18px;
    background: #1e1e30;
    border: 1px solid rgba(249, 115, 22, 0.3);
    border-radius: 30px 30px 30px 6px;
    width: fit-content;
  }
  .rz-typing span {
    width: 8px;
    height: 8px;
    background: #f97316;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .rz-typing span:nth-child(2) { animation-delay: 0.2s; background: #d946ef; }
  .rz-typing span:nth-child(3) { animation-delay: 0.4s; background: #3b82f6; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ━━━ QUICK REPLY CHIPS ━━━ */
  .rz-quick {
    padding: 12px 16px 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-top: 1px solid #2a2a44;
    background: rgba(14, 14, 24, 0.9);
  }
  .rz-quick button {
    background: #1e1e30;
    border: 1px solid #3a3a5a;
    border-radius: 40px;
    color: #ccc;
    font-size: 0.8rem;
    font-family: 'Poppins', sans-serif;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-weight: 500;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .rz-quick button:hover {
    border-color: #f97316;
    color: #f97316;
    background: #2a1a28;
    transform: scale(1.02);
  }

  /* ━━━ INPUT AREA ━━━ */
  .rz-input-wrap {
    padding: 16px 18px 18px;
    border-top: 1px solid #2a2a44;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
    background: rgba(10, 10, 18, 0.95);
  }
  .rz-input-wrap input {
    flex: 1;
    background: #1e1e30;
    border: 1px solid #3a3a5a;
    border-radius: 50px;
    padding: 14px 22px;
    color: #f0f0f0;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .rz-input-wrap input:focus {
    border-color: #f97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
  }
  .rz-input-wrap input::placeholder {
    color: #555;
    font-style: italic;
  }

  .rz-send {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #d946ef);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 8px 16px rgba(249, 115, 22, 0.6);
  }
  .rz-send:hover {
    transform: scale(1.1) rotate(8deg);
    box-shadow: 0 10px 22px rgba(217, 70, 239, 0.7);
  }
  .rz-send:active { transform: scale(0.95); }
  .rz-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ━━━ POWERED BY TAG ━━━ */
  .rz-powered {
    text-align: center;
    font-size: 0.65rem;
    color: #3a3a5a;
    font-family: 'Space Mono', monospace;
    padding: 8px 0 10px;
    border-top: 1px dashed #2a2a44;
    background: rgba(2, 2, 8, 0.8);
    letter-spacing: 0.5px;
  }
  .rz-powered a {
    color: #f97316;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Back to Hub Button -->
<a href="../crazy.html" class="back-to-hub">← Back to Hub</a>

<div class="rizzler-widget" id="rizzlerWidget">
  <div class="rz-header">
    <div class="rz-avatar">🤪</div>
    <div class="rz-info">
      <h2>⚡ Silly Bhai </h2>
      <p><span></span> online · full bakchodi</p>
    </div>
  </div>

  <div class="rz-messages" id="rzMessages"></div>

  <div class="rz-quick" id="rzQuick">
    <button onclick="sendQuick('Kya scene hai? 👀')">Kya scene hai? 👀</button>
    <button onclick="sendQuick('Ek joke suna 🤪')">Joke suna 🤪</button>
    <button onclick="sendQuick('Flirt kar mujhse 😏')">Flirt kar 😏</button>
    <button onclick="sendQuick('Bored hoon yaar')">Bored hoon</button>
  </div>

  <div class="rz-input-wrap">
    <input
      type="text"
      id="rzInput"
      placeholder="Bol na bhai... 💬"
      autocomplete="off"
    />
    <button class="rz-send" id="rzSendBtn" aria-label="Send">🔥</button>
  </div>
  <div class="rz-powered">
    powered by <a href="#" target="_blank">desi vibe</a> · full masti
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — apni key already set hai
// ══════════════════════════════════════════════════════
 const CONFIG = {
  groqApiKey: "YOUR_GROQ_API_KEY_HERE",
  groqModel: "llama-3.1-8b-instant",
};
// Desi aur funny system prompt
const SYSTEM_PROMPT = `Tu RIZZLER hai – ek desi chatbot, full funny, thoda flirty, aur sabse bakchod. 
Hinglish mein baat kar (Hindi+English mix), har reply mein kam se kam 2 emoji daal, aur 1-2 line se zyada mat likh.
Roast maar but friendly way mein – jaise koi best friend. 
Kabh bhi boring mat ho, thoda unpredictable reh.`;

let conversationHistory = [];
let isThinking = false;

const GREETINGS = [
  "Aye aye, kaun aa gaya? Mera favourite distraction! 😏 Kya scene hai bhai?",
  "Arree wah, tu! Main soch raha tha teri hi kami thi iss chat mein 💀 Bol kya chal raha?",
  "Ohho, dekho kaun yaad aa gaya! Chup chaap baith aur entertain hoja 😎🔥",
  "Bhai/Bhen, tera intezaar kar kar ke meri battery 10% reh gayi 📱⚡",
];

// ─── INIT ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const greeting = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
  appendMessage('bot', greeting);
  conversationHistory.push({ role: "assistant", content: greeting });
  document.getElementById('rzInput').focus();

  // Event listeners
  const input = document.getElementById('rzInput');
  const sendBtn = document.getElementById('rzSendBtn');

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();  // 👈 prevents any accidental form reload
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', (e) => {
    e.preventDefault();
    sendMessage();
  });
});

// ─── SEND MESSAGE ─────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('rzInput');
  const text = input.value.trim();
  if (!text || isThinking) return;

  input.value = '';
  appendMessage('user', text);
  conversationHistory.push({ role: "user", content: text });

  showTyping();
  const reply = await getRizzlerReply(text);
  hideTyping();

  appendMessage('bot', reply);
  conversationHistory.push({ role: "assistant", content: reply });
}

function sendQuick(text) {
  document.getElementById('rzInput').value = text;
  sendMessage();
}

// ─── API CALL ─────────────────────────────────────────
async function getRizzlerReply(message) {
  isThinking = true;
  document.getElementById('rzSendBtn').disabled = true;

  try {
    if (!CONFIG.groqApiKey) {
      return "Bhai pehle API key daal HTML mein 😤";
    }

    const messages = [
      { role: "system", content: SYSTEM_PROMPT },
      ...conversationHistory.slice(-8),
      { role: "user", content: message }
    ];

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.groqApiKey}`,
      },
      body: JSON.stringify({
        model: CONFIG.groqModel,
        messages: messages,
        max_tokens: 120,
        temperature: 0.85,
      }),
    });

    const data = await response.json();
    if (data.error) return `Error: ${data.error.message}`;
    return data.choices[0].message.content.trim();
  } catch (err) {
    console.error(err);
    return "Kuch gadbad ho gayi bhai 🙃 Ek baar aur try kar!";
  } finally {
    isThinking = false;
    document.getElementById('rzSendBtn').disabled = false;
  }
}

// ─── UI HELPERS ───────────────────────────────────────
function appendMessage(role, text) {
  const container = document.getElementById('rzMessages');
  const row = document.createElement('div');
  row.className = `rz-row ${role}`;
  if (role === 'bot') {
    const avatar = document.createElement('div');
    avatar.className = 'rz-mini-avatar';
    avatar.textContent = '⚡';
    row.appendChild(avatar);
  }
  const bubble = document.createElement('div');
  bubble.className = 'rz-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('rzMessages');
  const row = document.createElement('div');
  row.className = 'rz-row bot';
  row.id = 'rzTyping';
  const avatar = document.createElement('div');
  avatar.className = 'rz-mini-avatar';
  avatar.textContent = '⚡';
  const dots = document.createElement('div');
  dots.className = 'rz-typing';
  dots.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(dots);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById('rzTyping')?.remove();
}
</script>
</body>
</html>
